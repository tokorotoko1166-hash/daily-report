<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
    <!-- 携帯画面でのエラーメッセージ自動浮き出しデバッグツール -->
    <script>
        window.onerror = function(message, source, lineno, colno, error) {
            const div = document.createElement('div');
            div.style.position = 'fixed';
            div.style.top = '0';
            div.style.left = '0';
            div.style.width = '100%';
            div.style.background = 'rgba(239, 68, 68, 0.95)';
            div.style.color = 'white';
            div.style.padding = '1rem';
            div.style.zIndex = '99999';
            div.style.fontSize = '0.85rem';
            div.style.fontFamily = 'monospace';
            div.style.whiteSpace = 'pre-wrap';
            div.style.maxHeight = '50vh';
            div.style.overflowY = 'auto';
            div.innerHTML = '<strong>【スマホ側 JavaScript エラー検出】</strong><br>' + message + '<br>場所: ' + source + ' : ' + lineno + '行目';
            
            // bodyがまだ作られていない場合は待つ
            if (document.body) {
                document.body.appendChild(div);
            } else {
                window.addEventListener('DOMContentLoaded', () => {
                    document.body.appendChild(div);
                });
            }
            return false;
        };
        window.addEventListener('unhandledrejection', function(event) {
            const div = document.createElement('div');
            div.style.position = 'fixed';
            div.style.top = '0';
            div.style.left = '0';
            div.style.width = '100%';
            div.style.background = 'rgba(239, 68, 68, 0.95)';
            div.style.color = 'white';
            div.style.padding = '1rem';
            div.style.zIndex = '99999';
            div.style.fontSize = '0.85rem';
            div.style.fontFamily = 'monospace';
            div.style.whiteSpace = 'pre-wrap';
            div.innerHTML = '<strong>【非同期処理エラー検出】</strong><br>' + (event.reason ? event.reason.message || event.reason : '不明な非同期エラー');
            
            if (document.body) {
                document.body.appendChild(div);
            } else {
                window.addEventListener('DOMContentLoaded', () => {
                    document.body.appendChild(div);
                });
            }
        });
    </script>
