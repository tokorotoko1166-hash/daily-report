<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>現場台帳管理・集計（PC用）</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css?v=20260627">
    <script>
        window.onerror = function(msg, url, line, col, error) {
            alert("⚠️ 実行エラーを検出しました！\n\nエラー内容: " + msg + "\n発生ファイル: " + url.substring(url.lastIndexOf('/') + 1) + "\n発生行: " + line + " 行目 (列: " + col + ")");
            return false;
        };
    </script>
</head>
<body>
    <div class="app-container">
        <!-- 上部ヘッダー（ナビゲーションを横から上に統合） -->
        <header class="app-header" style="margin-bottom: 0; padding: 1rem 2rem; border-bottom: 1px solid var(--border-light); background: var(--bg-sidebar); backdrop-filter: var(--glass-blur); position: sticky; top: 0; z-index: 100;">
            <div class="header-left" style="gap: 2rem;">
                <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="メニューを開く">
                    <i data-lucide="menu"></i>
                </button>
                <div class="sidebar-brand" style="display: flex; align-items: center; gap: 0.75rem; padding: 0; border: none; margin: 0;">
                    <i data-lucide="building-2" class="brand-icon" style="width: 1.8rem; height: 1.8rem; color: var(--color-primary);"></i>
                    <span class="brand-name" style="font-size: 1.15rem; font-weight: 700; letter-spacing: 0.05em; background: linear-gradient(135deg, var(--color-primary), var(--color-info)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">現場台帳・集計</span>
                </div>
                
                <!-- 上部に横並びするグローバルナビゲーション -->
                <nav class="header-nav" id="header-nav" style="display: flex; gap: 0.5rem;">
                    <a href="#ledger" class="nav-item active" data-view="ledger" style="padding: 0.55rem 1rem; border-radius: 8px; font-size: 0.9rem; gap: 0.6rem;">
                        <i data-lucide="book-open" style="width: 1.1rem; height: 1.1rem;"></i>
                        <span>現場台帳一覧</span>
                    </a>
                    <a href="#site-list" class="nav-item" data-view="site-list" style="padding: 0.55rem 1rem; border-radius: 8px; font-size: 0.9rem; gap: 0.6rem;">
                        <i data-lucide="clipboard-list" style="width: 1.1rem; height: 1.1rem;"></i>
                        <span>現場一覧表</span>
                    </a>
                    <a href="#purchase-list" class="nav-item" data-view="purchase-list" style="padding: 0.55rem 1rem; border-radius: 8px; font-size: 0.9rem; gap: 0.6rem;">
                        <i data-lucide="shopping-cart" style="width: 1.1rem; height: 1.1rem;"></i>
                        <span>仕入れ一覧</span>
                    </a>

                    <a href="#partner-ledger" class="nav-item" data-view="partner-ledger" style="padding: 0.55rem 1rem; border-radius: 8px; font-size: 0.9rem; gap: 0.6rem;">
                        <i data-lucide="users" style="width: 1.1rem; height: 1.1rem;"></i>
                        <span>協力業者台帳</span>
                    </a>
                </nav>
            </div>
            <div class="header-right" style="gap: 1rem;">
                <a href="index.html" class="btn btn-secondary" style="height: 2.2rem; display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; text-decoration:none; font-size: 0.85rem; padding: 0 0.85rem; border-radius: 8px;">
                    <i data-lucide="home" style="width: 0.95rem; height: 0.95rem;"></i>
                    <span>ポータルへ戻る</span>
                </a>
                <button id="theme-toggle" class="theme-toggle-btn" aria-label="テーマ切り替え" style="height: 2.2rem; width: auto; padding: 0 0.85rem; display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; border: 1px solid var(--border-light); background: var(--bg-card); border-radius: 8px; cursor: pointer; color: var(--text-main); font-size: 0.85rem;">
                    <i data-lucide="sun" class="sun-icon" style="width: 0.95rem; height: 0.95rem;"></i>
                    <i data-lucide="moon" class="moon-icon" style="width: 0.95rem; height: 0.95rem;"></i>
                    <span class="theme-text" style="display:none;">ライトモード</span>
                </button>
                <button id="btn-cloud-sync" class="btn btn-secondary" style="height: 2.2rem; display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; font-size: 0.85rem; padding: 0 0.85rem; border-radius: 8px; background: rgba(16, 185, 129, 0.1); color: var(--color-success); border-color: rgba(16, 185, 129, 0.2);">
                    <i data-lucide="refresh-cw" style="width: 0.95rem; height: 0.95rem;"></i>
                    <span>クラウド同期</span>
                </button>
                <button id="btn-cloud-config" class="btn btn-secondary" style="height: 2.2rem; display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; font-size: 0.85rem; padding: 0 0.85rem; border-radius: 8px;" title="クラウド中継の設定">
                    <i data-lucide="settings" style="width: 0.95rem; height: 0.95rem;"></i>
                </button>
                <div class="current-date-badge" id="sync-time-badge" style="font-family: 'Inter', sans-serif; background: rgba(16, 185, 129, 0.08); color: var(--color-success); border: 1px solid rgba(16, 185, 129, 0.15); display: inline-flex; align-items: center; gap: 0.35rem; padding: 0 0.75rem; border-radius: 8px; height: 2.2rem; font-size: 0.8rem;">
                    <i data-lucide="clock" style="width: 0.85rem; height: 0.85rem;"></i>
                    <span id="last-sync-time" style="font-weight: 500;">最終同期: なし</span>
                </div>
                <div class="current-date-badge" style="font-family: 'Inter', sans-serif;">
                    <i data-lucide="calendar"></i>
                    <span id="header-date">2026年6月27日</span>
                </div>
            </div>
        </header>

        <!-- メインコンテンツ領域 -->
        <main class="main-content" style="flex: 1; padding: 2rem;">
            <!-- タイトル表示 -->
            <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border-light);">
                <h1 class="page-title" id="page-title" style="font-size: 1.5rem; font-weight: 700; margin: 0;">現場台帳・集計一覧</h1>
            </div>

            <!-- ビュー切り替えコンテナ -->
            <div class="view-container" id="view-container">
                <!-- ここに動的に各ビューが描画されます -->
                

            </div>
        </main>
    </div>

    <!-- モーダルウィンドウの共通コンテナ -->
    <div class="modal-backdrop" id="modal-backdrop">
        <div class="modal-card" id="modal-card">
            <div class="modal-header">
                <h3 class="modal-title" id="modal-title">モーダル</h3>
                <button class="modal-close-btn" id="modal-close-btn">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- 動的にフォーム等がインサートされます -->
            </div>
        </div>
    </div>

    <!-- トースト通知 -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Excel / CSV Parser (SheetJS) -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <!-- PDF.js SDK -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <!-- Crypto-JS SDK (Updated: 20260719_203647) -->
    <script src="js/crypto-js.min.js"></script>
    <script src="js/db_v2.js?v=20260706_141001"></script>
    <script src="js/ledger_manager_v2.js?v=20260706_141001"></script>
</body>
</html>
